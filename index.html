<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111214; /* Deep Gemini/ChatGPT dark background */
        }
        h1, h2, .font-display {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar to mimic premium web apps */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f3037;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="text-gray-200 h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 bg-[#1e1f20] h-full flex flex-col justify-between transition-all duration-300 border-r border-[#2d2e30] z-20">
        <div>
            <div class="p-4 flex items-center justify-between">
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-[#2d2e30]">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <span class="font-display font-semibold text-sm tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 sidebar-text">COMPANION</span>
            </div>

            <div class="px-3 mt-4">
                <button onclick="clearChat()" class="w-full flex items-center gap-3 bg-[#2b2c2e] hover:bg-[#37393b] text-sm font-medium text-gray-200 py-3 px-4 rounded-full transition-colors shadow-sm">
                    <i class="fa-solid fa-plus text-blue-400"></i>
                    <span class="sidebar-text">New chat</span>
                </button>
            </div>

            <div class="px-3 mt-6 sidebar-text">
                <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Recent</p>
                <div id="recent-chats-list" class="space-y-1 overflow-y-auto max-h-[50vh]">
                    </div>
            </div>
        </div>

        <div class="p-3 border-t border-[#2d2e30] sidebar-text">
            <button class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 hover:text-white hover:bg-[#2b2c2e] rounded-lg transition-colors">
                <i class="fa-regular fa-circle-question"></i>
                <span>Help & Support</span>
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 hover:text-white hover:bg-[#2b2c2e] rounded-lg transition-colors">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-[#131314]">
        
        <header class="h-14 border-b border-[#2d2e30] flex items-center justify-between px-6 bg-[#131314]/80 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white mr-2">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="font-display font-medium text-gray-200">Companion Engine</span>
                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex bg-[#1e1f20] rounded-full p-0.5 border border-[#2d2e30]">
                    <button class="text-xs px-3 py-1.5 rounded-full bg-[#2b2c2e] text-white font-medium">Chat</button>
                    <button class="text-xs px-3 py-1.5 rounded-full text-gray-400 hover:text-white font-medium">Artifacts</button>
                </div>
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-600 flex items-center justify-center text-xs font-bold text-white shadow-md shadow-indigo-500/20">
                    U
                </div>
            </div>
        </header>

        <section id="chat-feed" class="flex-1 overflow-y-auto py-8 px-4 sm:px-6">
            <div class="max-w-3xl mx-auto space-y-8" id="chat-container">
                
                <div id="welcome-screen" class="text-center py-12 space-y-4">
                    <div class="inline-flex p-4 bg-[#1e1f20] rounded-3xl border border-[#2d2e30] text-purple-400 text-3xl mb-2 animate-pulse">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-display font-semibold text-gray-100">What can I help with today?</h2>
                    <p class="text-gray-400 max-w-md mx-auto text-sm leading-relaxed">Ask a question, write some code, or analyze complex datasets directly from your desktop workspace.</p>
                </div>

            </div>
        </section>

        <footer class="p-4 bg-gradient-to-t from-[#131314] via-[#131314] to-transparent">
            <div class="max-w-3xl mx-auto mb-2">
                <form id="chat-form" onsubmit="handleSendMessage(event)" class="bg-[#1e1f20] border border-[#2d2e30] rounded-3xl p-3 focus-within:border-[#4d4d50] focus-within:ring-1 focus-within:ring-[#4d4d50] transition-all shadow-xl">
                    <div class="flex items-end gap-2">
                        
                        <button type="button" class="text-gray-400 hover:text-gray-200 p-2 rounded-full hover:bg-[#2b2c2e] transition-colors mb-1">
                            <i class="fa-solid fa-paperclip text-lg"></i>
                        </button>

                        <textarea id="user-input" rows="1" placeholder="Message Companion..." class="w-full bg-transparent text-gray-200 placeholder-gray-500 focus:outline-none resize-none py-2 px-1 max-h-48 text-base leading-relaxed" oninput="autoGrow(this)"></textarea>

                        <button type="submit" id="send-btn" class="bg-white text-black hover:bg-gray-200 w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-md disabled:opacity-30 disabled:hover:bg-white mb-0.5">
                            <i class="fa-solid fa-arrow-up text-md"></i>
                        </button>
                    </div>
                </form>
                <p class="text-center text-[11px] text-gray-500 mt-3">
                    Companion can make mistakes. Verify important context.
                </p>
            </div>
        </footer>

    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const userInput = document.getElementById('user-input');

        // Automate text-area resizing for long prompt blocks
        function autoGrow(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight) + "px";
        }

        // Toggle Gemini Side Panel expansion/collapsing state
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarTexts = document.querySelectorAll('.sidebar-text');
            
            if (sidebar.classList.contains('w-64')) {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-16');
                sidebarTexts.forEach(el => el.classList.add('hidden'));
            } else {
                sidebar.classList.remove('w-16');
                sidebar.classList.add('w-64');
                sidebarTexts.forEach(el => el.classList.remove('hidden'));
            }
        }

        // Clear layout state back to original setup
        function clearChat() {
            chatContainer.innerHTML = '';
            chatContainer.appendChild(welcomeScreen);
            welcomeScreen.classList.remove('hidden');
        }

        // Handle sending user input payloads
        function handleSendMessage(event) {
            event.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Remove branding setup block if it exists
            if (welcomeScreen) {
                welcomeScreen.classList.add('hidden');
            }

            // 1. Render User Message Structure
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto'; // Reset textarea line height

            // 2. Render Mock Streaming AI Response State
            setTimeout(() => {
                appendMessage('assistant', "This is a front-end rendering framework mimicking ChatGPT, Claude, and Gemini templates. Hook up your local Python execution pipeline here to see live AI responses.");
            }, 600);
        }

        // Construct HTML markup structures for feed elements
        function appendMessage(role, text) {
            const msgWrapper = document.createElement('div');
            msgWrapper.className = `flex gap-4 p-4 rounded-2xl max-w-3xl mx-auto transition-all ${role === 'user' ? 'bg-[#2b2c2e]/40 justify-end ml-auto max-w-[85%]' : 'mr-auto'}`;

            if (role === 'user') {
                msgWrapper.innerHTML = `
                    <div class="text-sm text-gray-200 leading-relaxed break-words">${text}</div>
                `;
            } else {
                msgWrapper.innerHTML = `
                    <div class="flex-shrink-0 w-7 h-7 rounded-full bg-teal-600 flex items-center justify-center text-xs font-bold text-white shadow-md">
                        AI
                    </div>
                    <div class="space-y-2 flex-1">
                        <p class="text-xs font-semibold text-gray-400 tracking-wider">COMPANION</p>
                        <div class="text-sm text-gray-300 leading-relaxed font-normal">${text}</div>
                    </div>
                `;
            }

            chatContainer.appendChild(msgWrapper);
            
            // Instantly viewport scroll focus down cleanly
            const chatFeed = document.getElementById('chat-feed');
            chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
